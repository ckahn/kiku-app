name: Migrate and Deploy Production

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

jobs:
  deploy-production:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KIKU_APP_DATABASE_URL_UNPOOLED: ${{ secrets.KIKU_APP_DATABASE_URL_UNPOOLED }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out the tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --omit=optional

      - name: Run production database migrations
        run: npm run db:migrate

      - name: Trigger Vercel production deploy
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
