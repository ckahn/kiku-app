# "preview" is effectively the production deployment. Vercel's free plan
# only supports password protection on preview branches, not on the main
# branch, so the live site is intentionally served from preview rather
# than main. Keeping preview in sync with main ensures every merge
# automatically ships to the protected deployment.
name: Sync preview to main

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git push origin main:preview --force-with-lease
