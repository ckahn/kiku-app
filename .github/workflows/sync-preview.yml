# preview is the Vercel deployment target that has Vercel auth enabled.
# Keeping it in sync with main ensures every main commit gets a
# password-protected preview build automatically.
name: Sync preview to main

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git push origin main:preview --force-with-lease
